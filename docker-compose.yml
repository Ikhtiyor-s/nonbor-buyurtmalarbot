version: '3.8'

services:
  seller-bot:
    build: .
    container_name: seller-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=*
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - ./bot.log:/app/bot.log
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/webhook/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
